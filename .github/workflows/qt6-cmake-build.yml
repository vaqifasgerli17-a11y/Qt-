name: Qt6 QML LocalStorage Build Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Kodları götür
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Lazımi Linux qrafik paketlərini quraşdır
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxkbcommon-dev libx11-xcb-dev libglu1-mesa-dev

    # 3. Python mühitini stabil versiyaya fiksə et
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. Ən son versiyalı aqtinstall vasitəsilə Qt6-nı birbaşa yüklə (Xətanın qarşısını alır)
    - name: Install Qt6 via aqtinstall
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        # Linux üçün rəsmi Qt 6.5.0-ı və declarative (QML) modulunu endiririk
        python -m aqt install-qt linux desktop 6.5.0 gcc_64 -m qtdeclarative

    # 5. Qt-nin sistem yollarını CMake-ə tanıt
    - name: Configure CMake
      run: |
        export Qt6_DIR=$HOME/Qt/6.5.0/gcc_64/lib/cmake/Qt6
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DQt6_DIR=$Qt6_DIR

    # 6. Kodları compile et
    - name: Build Application
      run: cmake --build build
